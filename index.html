<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Apple Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f2f2f7] flex justify-center items-center min-h-screen p-4 font-sans">

    <div id="app" class="bg-white w-full max-w-[400px] min-h-[700px] rounded-[3rem] shadow-[0_20px_60px_rgba(0,0,0,0.1)] p-8 space-y-6 border border-white flex flex-col">
        
        <header class="flex justify-between items-center pt-2">
            <h1 class="text-3xl font-bold text-black tracking-tight font-sans">Wallet</h1>
            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-xl shadow-inner">👤</div>
        </header>

        <div class="relative overflow-hidden bg-gradient-to-br from-slate-50 to-slate-200 p-8 rounded-[2rem] aspect-[1.58/1] shadow-sm">
            <div class="absolute top-0 left-0 w-full h-full bg-white/30 backdrop-blur-xl"></div>
            <div class="relative z-10 h-full flex flex-col justify-between italic">
                <span class="text-slate-400 font-medium text-xs tracking-widest uppercase">Total Balance</span>
                <div id="balance-amount" class="text-5xl font-semibold text-slate-900 tracking-tighter">$0</div>
            </div>
        </div>

        <div class="bg-[#f9f9fb] rounded-[2rem] p-4 flex justify-center items-center">
            <div class="w-40 h-40">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <div class="flex-grow overflow-hidden flex flex-col">
            <h3 class="text-lg font-bold text-black px-2 mb-2">Transactions</h3>
            <ul id="transaction-list" class="space-y-1 overflow-y-auto pr-2 custom-scrollbar flex-grow">
                </ul>
        </div>
        
        <form id="transaction-form" class="pt-4 border-t border-slate-100 space-y-3">
             <input type="text" id="title" placeholder="Description" class="w-full p-4 bg-[#f2f2f7] rounded-2xl outline-none focus:ring-2 ring-blue-400/30 text-sm transition-all">
             <div class="grid grid-cols-2 gap-2">
                <input type="number" id="amount" placeholder="Amount" class="p-4 bg-[#f2f2f7] rounded-2xl outline-none text-sm">
                <select id="type" class="p-4 bg-[#f2f2f7] rounded-2xl outline-none text-sm">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
             </div>
             <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-[1.5rem] active:scale-95 transition-all shadow-lg">
                Add Transaction
             </button>
        </form>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
