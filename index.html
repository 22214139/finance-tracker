<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker 💰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/style.css">
    <style>
       
        #transaction-list::-webkit-scrollbar {
            width: 4px;
        }
        #transaction-list::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-[#f2f2f7] flex justify-center items-center min-h-screen p-4 font-sans">

    <div id="app" class="bg-white w-full max-w-md rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-8 space-y-8 border border-white">
        
        <header class="flex justify-between items-center px-2">
            <h1 class="text-3xl font-bold text-black tracking-tight">Wallet</h1>
            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-xl">👤</div>
        </header>

        <div class="relative overflow-hidden bg-gradient-to-br from-[#fcfcfc] to-[#e5e5e5] p-8 rounded-[2rem] shadow-sm border border-slate-200/50 aspect-[1.58/1]">
            <div class="absolute top-0 left-0 w-full h-full bg-white/20 backdrop-blur-3xl"></div>
            
            <div class="relative z-10 h-full flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 font-medium text-sm tracking-widest uppercase">Total Balance</span>
                    <div class="w-12 h-8 bg-gradient-to-tr from-orange-400 to-yellow-200 rounded-md opacity-80"></div>
                </div>
                <div id="balance-amount" class="text-5xl font-semibold text-slate-800 tracking-tighter">$0</div>
            </div>
        </div>

        <div class="bg-[#f9f9fb] rounded-[2rem] p-6 flex justify-center items-center">
            <div class="w-44 h-44">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-end px-2">
                <h3 class="text-xl font-bold text-black">Latest Transactions</h3>
                <button class="text-blue-600 text-sm font-medium hover:underline">Show All</button>
            </div>
            <ul id="transaction-list" class="space-y-1 max-h-60 overflow-y-auto custom-scrollbar">
                </ul>
        </div>
        
        <form id="transaction-form" class="pt-4 border-t border-slate-100 space-y-4">
             <div class="grid grid-cols-2 gap-2">
                <input type="text" id="title" placeholder="Description" class="col-span-2 p-4 bg-[#f2f2f7] rounded-xl outline-none focus:ring-2 ring-blue-500/20 text-sm">
                <input type="number" id="amount" placeholder="Amount" class="p-4 bg-[#f2f2f7] rounded-xl outline-none text-sm">
                <select id="type" class="p-4 bg-[#f2f2f7] rounded-xl outline-none text-sm">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
             </div>
             <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-2xl active:scale-95 transition-transform">
                Add Transaction
             </button>
        </form>
    </div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
