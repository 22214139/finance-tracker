<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-slate-800/50 p-10 rounded-[2.5rem] border border-slate-700/50 backdrop-blur-xl shadow-2xl">
        <h1 class="text-3xl font-black mb-2 text-emerald-400">Welcome Back</h1>
        <p class="text-slate-400 mb-8 text-sm">Enter your details to access your dashboard.</p>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-white focus:outline-none focus:border-emerald-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Password</label>
                <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-white focus:outline-none focus:border-emerald-500 transition">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-4 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95">
                LOG IN
            </button>
        </form>
        
        <p class="mt-8 text-center text-slate-500 text-sm">
            Don't have an account? <a href="#" class="text-emerald-400 font-bold">Sign Up</a>
        </p>
    </div>
    <script type="module" src="./src/controllers/auth.ts"></script>
</body>
</html>
